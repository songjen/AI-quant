name: 每日增量更新股票数据

on:
  # 每个交易日（周一至周五）北京时间 16:30 执行（UTC 08:30）
  # A股15:00收盘，等30分钟数据稳定后更新
  schedule:
    - cron: '30 8 * * 1-5'
  # 支持手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install -r scripts/requirements.txt

      - name: 执行增量更新
        run: |
          python scripts/update_stock_data.py

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add csv/ data/
          if git diff --staged --quiet; then
            echo "无新数据需要更新"
          else
            git commit -m "auto: 增量更新股票数据 $(date -u +%Y-%m-%d)"
            git push
          fi
