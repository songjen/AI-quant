<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Songjen的研究空间 · A股量化策略</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0d;--bg-card:#1a1a1a;--bg-card-hover:#222;--border:rgba(255,255,255,0.08);
  --text:#f0f0f0;--text-dim:#888;--text-muted:#555;
  --accent:#4fc3f7;--accent-glow:rgba(79,195,247,0.15);
}
body{
  font-family:'Segoe UI','Microsoft YaHei',-apple-system,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ===== Nav ===== */
.nav{
  position:sticky;top:0;z-index:100;
  background:rgba(13,13,13,0.85);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;
}
.nav-brand{font-size:16px;font-weight:700;color:var(--text);letter-spacing:.5px}
.nav-brand .dot{color:var(--accent)}
.nav-links{display:flex;align-items:center;gap:20px}
.nav-links a{color:var(--text-dim);text-decoration:none;font-size:13px;transition:color .2s}
.nav-links a:hover{color:var(--text)}
.nav-gh{color:var(--text-dim);font-size:12px;display:flex;align-items:center;gap:6px;text-decoration:none}
.nav-gh:hover{color:var(--text)}

/* ===== Hero ===== */
.hero{
  text-align:center;padding:72px 32px 48px;
  background:radial-gradient(ellipse at center top,var(--accent-glow),transparent 60%);
}
.hero h1{
  font-size:38px;font-weight:800;letter-spacing:1px;margin-bottom:14px;
  background:linear-gradient(135deg,#fff,#a0a0a0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hero p{font-size:15px;color:var(--text-dim);max-width:560px;margin:0 auto;line-height:1.7}

/* ===== Filter ===== */
.filter-bar{
  display:flex;justify-content:center;gap:8px;padding:0 32px 32px;flex-wrap:wrap;
}
.filter-btn{
  padding:7px 18px;border:1px solid var(--border);background:transparent;
  color:var(--text-dim);border-radius:20px;cursor:pointer;font-size:12px;
  transition:all .2s;
}
.filter-btn:hover{border-color:rgba(255,255,255,0.2);color:var(--text)}
.filter-btn.active{background:var(--accent);color:#0d0d0d;border-color:var(--accent);font-weight:600}

/* ===== Strategy Grid ===== */
.grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:20px;padding:0 32px 40px;max-width:1400px;margin:0 auto;
}
.card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:12px;
  padding:28px 24px;position:relative;overflow:hidden;transition:all .3s;
  text-decoration:none;color:inherit;display:block;
}
.card:hover{
  background:var(--bg-card-hover);border-color:rgba(255,255,255,0.15);
  transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,0.3);
}
.card::before{
  content:'';position:absolute;top:0;left:0;width:100%;height:3px;
  background:var(--card-color,#4fc3f7);
}
.card-icon{
  font-size:28px;margin-bottom:14px;display:inline-block;
}
.card-category{
  display:inline-block;font-size:10px;font-weight:600;letter-spacing:.8px;
  text-transform:uppercase;color:var(--card-color,#4fc3f7);
  background:rgba(79,195,247,0.08);padding:3px 10px;border-radius:4px;
  margin-bottom:10px;
}
.card-name{
  font-size:22px;font-weight:700;color:var(--text);margin-bottom:8px;line-height:1.3;
}
.card-desc{
  font-size:13px;color:var(--text-dim);line-height:1.6;margin-bottom:16px;
}
.card-features{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.card-tag{
  font-size:11px;color:var(--text-muted);background:rgba(255,255,255,0.04);
  padding:3px 9px;border-radius:4px;border:1px solid var(--border);
}
.card-stocks{font-size:11px;color:var(--text-muted);margin-bottom:14px}
.card-stocks span{color:var(--text-dim)}
.card-arrow{
  font-size:13px;color:var(--card-color,#4fc3f7);font-weight:600;
  display:flex;align-items:center;gap:4px;
}
.card-arrow .arr{transition:transform .2s}
.card:hover .card-arrow .arr{transform:translateX(4px)}

/* Coming Soon card */
.card.disabled{opacity:.5;cursor:default}
.card.disabled:hover{transform:none;box-shadow:none;background:var(--bg-card)}
.card.disabled .card-arrow{color:var(--text-muted)}
.card-badge{
  position:absolute;top:12px;right:12px;
  font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;
  background:rgba(255,255,255,0.06);color:var(--text-muted);
}

/* ===== Stats ===== */
.stats{
  display:flex;justify-content:center;gap:48px;padding:40px 32px;
  border-top:1px solid var(--border);
}
.stat{text-align:center}
.stat-num{font-size:28px;font-weight:800;color:var(--accent)}
.stat-label{font-size:12px;color:var(--text-dim);margin-top:4px}

/* ===== Footer ===== */
.footer{
  text-align:center;padding:24px 32px 32px;
  border-top:1px solid var(--border);
}
.footer p{font-size:12px;color:var(--text-muted);line-height:1.8}
.footer a{color:var(--text-dim);text-decoration:none}
.footer a:hover{color:var(--accent)}

/* ===== Loading ===== */
.loading{
  position:fixed;inset:0;background:var(--bg);z-index:9999;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;
}
.loading .spinner{
  border:3px solid var(--border);border-top:3px solid var(--accent);
  border-radius:50%;width:36px;height:36px;animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:640px){
  .hero{padding:48px 24px 32px}
  .hero h1{font-size:28px}
  .grid{padding:0 16px 32px;gap:16px}
  .nav{padding:0 16px}
  .stats{gap:24px}
}
</style>
</head>
<body>

<div class="loading" id="loading">
<div class="spinner"></div>
<div style="color:var(--text-dim);font-size:14px">加载策略数据...</div>
</div>

<nav class="nav">
<div class="nav-brand">Songjen<span class="dot">.</span>研究空间</div>
<div class="nav-links">
<a href="dashboard.html">技术分析</a>
<a href="https://github.com/songjen/AI-quant" target="_blank" class="nav-gh">GitHub ↗</a>
</div>
</nav>

<section class="hero">
<h1>Songjen的研究空间</h1>
<p>A股量化策略研究平台 · 交互式参数回测 · 多维度绩效对比<br>覆盖趋势跟踪、均值回归等策略体系，数据每日自动更新</p>
</section>

<div class="filter-bar" id="filterBar"></div>
<div class="grid" id="strategyGrid"></div>

<div class="stats">
<div class="stat"><div class="stat-num" id="statStrategies">0</div><div class="stat-label">策略体系</div></div>
<div class="stat"><div class="stat-num" id="statStocks">3</div><div class="stat-label">覆盖股票</div></div>
<div class="stat"><div class="stat-num" id="statDataPoints">0</div><div class="stat-label">数据点</div></div>
<div class="stat"><div class="stat-num" id="statUpdated">--</div><div class="stat-label">数据更新</div></div>
</div>

<footer class="footer">
<p>数据来源：腾讯财经API · 前复权(qfq) · GitHub Actions 每日自动增量更新<br>
技术栈：ECharts · 纯前端回测引擎 · GitHub Pages · <a href="https://github.com/songjen/AI-quant" target="_blank">songjen/AI-quant</a></p>
</footer>

<script>
async function init(){
  try{
    const resp = await fetch('data/strategies.json');
    const data = await resp.json();
    document.getElementById('loading').style.display = 'none';
    renderStrategies(data);
    renderFilters(data);
    renderStats(data);
    document.title = data.site_name + ' · A股量化策略';
  }catch(e){
    document.getElementById('loading').innerHTML =
      '<div style="color:#e24b4a;font-size:14px">数据加载失败: '+e.message+'</div>';
  }
}

let currentFilter = 'all';

function renderFilters(data){
  const cats = ['all'];
  data.strategies.forEach(s => {
    if(!cats.includes(s.category)) cats.push(s.category);
  });
  const catLabels = {
    'all':'全部','趋势跟踪':'趋势跟踪','对比分析':'对比分析',
    '均值回归':'均值回归','动量策略':'动量策略','统计套利':'统计套利',
    'AI预测':'AI预测','分析工具':'分析工具'
  };
  const bar = document.getElementById('filterBar');
  bar.innerHTML = cats.map(c =>
    '<button class="filter-btn'+(c==='all'?' active':'')+'" onclick="setFilter(\''+c+'\')">'+(catLabels[c]||c)+'</button>'
  ).join('');
}

function setFilter(cat){
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const resp = window._strategiesData;
  if(resp) renderStrategies(resp);
}

function renderStrategies(data){
  window._strategiesData = data;
  const grid = document.getElementById('strategyGrid');
  const filtered = currentFilter === 'all'
    ? data.strategies
    : data.strategies.filter(s => s.category === currentFilter);

  grid.innerHTML = filtered.map(s => {
    const isActive = s.status === 'active';
    const tag = isActive ? '' : '<div class="card-badge">即将上线</div>';
    const features = s.features.map(f => '<span class="card-tag">'+f+'</span>').join('');
    const stocks = s.stocks.length > 0
      ? '<div class="card-stocks">覆盖标的：<span>'+s.stocks.join(' · ')+'</span></div>'
      : '';
    const arrow = isActive
      ? '<div class="card-arrow">进入策略 <span class="arr">→</span></div>'
      : '<div class="card-arrow">开发中</div>';

    return '<a'+(isActive?' href="'+s.url+'"':'')+' class="card'+(isActive?'':' disabled')+'"'+
      ' style="--card-color:'+s.color+'">'+
      tag+
      '<div class="card-icon">'+s.icon+'</div>'+
      '<div class="card-category">'+s.category+'</div>'+
      '<div class="card-name">'+s.name+'</div>'+
      '<div class="card-desc">'+s.summary+'</div>'+
      '<div class="card-features">'+features+'</div>'+
      stocks+
      arrow+
      '</a>';
  }).join('');
}

function renderStats(data){
  const active = data.strategies.filter(s => s.status === 'active');
  document.getElementById('statStrategies').textContent = active.length;
  document.getElementById('statUpdated').textContent = (data.updated || '--').slice(5);

  // Count data points
  fetch('data/all_stocks.json')
    .then(r => r.json())
    .then(d => {
      let total = 0;
      for(const k in d){
        if(d[k].ohlcv) total += d[k].ohlcv.length;
      }
      document.getElementById('statDataPoints').textContent = total.toLocaleString();
    })
    .catch(() => {
      document.getElementById('statDataPoints').textContent = '5,000+';
    });
}

init();
</script>
</body>
</html>
