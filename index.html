<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML 量化选股策略回测看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Microsoft YaHei', sans-serif; background: #f5f6fa; color: #2d3436; }
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 32px 40px; }
.header h1 { font-size: 26px; font-weight: 600; margin-bottom: 6px; }
.header p { font-size: 14px; opacity: 0.8; }
.container { max-width: 1400px; margin: 0 auto; padding: 24px; }

/* Summary Cards */
.summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.card .label { font-size: 12px; color: #636e72; margin-bottom: 4px; }
.card .value { font-size: 24px; font-weight: 700; }
.card .sub { font-size: 12px; color: #b2bec3; margin-top: 2px; }
.positive { color: #d63031; }
.negative { color: #00b894; }

/* Parameter Panel */
.params { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.params h3 { font-size: 15px; margin-bottom: 16px; color: #2d3436; }
.param-row { display: flex; flex-wrap: wrap; gap: 24px; }
.param-group { flex: 1; min-width: 180px; }
.param-group label { display: block; font-size: 13px; color: #636e72; margin-bottom: 6px; }
.param-group input[type="range"] { width: 100%; accent-color: #0984e3; }
.param-group .val { font-size: 14px; font-weight: 600; color: #0984e3; margin-left: 8px; }
select { padding: 6px 12px; border: 1px solid #dfe6e9; border-radius: 6px; font-size: 13px; width: 100%; }

/* Charts Grid */
.charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.chart-box { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.chart-box h3 { font-size: 14px; color: #636e72; margin-bottom: 12px; }
.chart-box.wide { grid-column: 1 / -1; }
.chart-box canvas { max-height: 340px; }

/* Table */
.table-wrap { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow-x: auto; }
.table-wrap h3 { font-size: 15px; margin-bottom: 12px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #f8f9fa; padding: 10px 12px; text-align: left; font-weight: 500; color: #636e72; border-bottom: 2px solid #dfe6e9; }
td { padding: 8px 12px; border-bottom: 1px solid #f1f2f6; }
tr:hover { background: #f8f9fa; }
.code { font-family: 'Courier New', monospace; font-size: 12px; color: #0984e3; }

/* Feature Importance */
.feat-bar { display: flex; align-items: center; margin-bottom: 4px; }
.feat-name { width: 180px; font-size: 11px; text-align: right; padding-right: 10px; color: #636e72; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.feat-track { flex: 1; height: 18px; background: #f1f2f6; border-radius: 4px; overflow: hidden; }
.feat-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.cumulative { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }

/* Period select */
.period-select { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.period-btn { padding: 6px 16px; border: 1px solid #dfe6e9; border-radius: 20px; cursor: pointer; font-size: 12px; background: #fff; transition: all 0.2s; }
.period-btn.active { background: #0984e3; color: #fff; border-color: #0984e3; }
.period-btn:hover { border-color: #0984e3; }

/* Responsive */
@media (max-width: 900px) { .charts { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <h1> ML 量化选股策略回测看板</h1>
  <p>基于随机森林 | 37 个基本面+技术因子 | Walk-Forward 时序回测 | 每季度 TOP10 选股</p>
</div>

<div class="container">

<!-- Summary Cards -->
<div class="summary" id="summaryCards"></div>

<!-- Parameter Panel -->
<div class="params">
  <h3>参数调节面板</h3>
  <div class="param-row">
    <div class="param-group">
      <label>TOP K 选股数量 <span id="topKVal" class="val">10</span></label>
      <input type="range" id="topKSlider" min="3" max="30" value="10" step="1">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#b2bec3"><span>3</span><span>30</span></div>
    </div>
    <div class="param-group">
      <label>特征重要性显示数量 <span id="featCountVal" class="val">15</span></label>
      <input type="range" id="featCountSlider" min="5" max="37" value="15" step="1">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#b2bec3"><span>5</span><span>37</span></div>
    </div>
    <div class="param-group">
      <label>查看测试期</label>
      <select id="periodSelect"></select>
    </div>
    <div class="param-group">
      <label>图表主题</label>
      <select id="themeSelect">
        <option value="light">浅色</option>
        <option value="dark">深色</option>
      </select>
    </div>
  </div>
</div>

<!-- Charts -->
<div class="charts" id="chartsContainer">
  <div class="chart-box">
    <h3>每期 TOP K vs 基准收益</h3>
    <canvas id="returnChart"></canvas>
  </div>
  <div class="chart-box">
    <h3>超额收益</h3>
    <canvas id="excessChart"></canvas>
  </div>
  <div class="chart-box">
    <h3>累计净值曲线（策略 vs 基准）</h3>
    <canvas id="cumulChart"></canvas>
  </div>
  <div class="chart-box">
    <h3>Spearman 秩相关（选股排序能力）</h3>
    <canvas id="spearmanChart"></canvas>
  </div>
  <div class="chart-box wide">
    <h3>特征重要性 TOP <span id="featTitleNum">15</span></h3>
    <div id="featImportance"></div>
  </div>
</div>

<!-- TOP K Details -->
<div class="table-wrap">
  <h3>TOP <span id="tableTitleNum">10</span> 选股详情</h3>
  <div class="period-select" id="periodTabs"></div>
  <table id="topKTable">
    <thead><tr><th>排名</th><th>股票代码</th><th>预测收益</th><th>实际收益</th><th>预测误差</th></tr></thead>
    <tbody id="topKBody"></tbody>
  </table>
</div>

</div>

<script>
// ══════════════════════════════════
// Data from backtest
// ══════════════════════════════════
const BACKTEST_DATA = {
  "summary": { "total_excess_return": -0.088, "avg_excess_return": -0.044, "win_rate": 0, "avg_spearman": 0.0989 },
  "periods": [
    {
      "test_date": "2021-12-31", "top10_return": -0.1195, "benchmark": -0.082,
      "excess": -0.0375, "spearman": 0.0571,
      "top10": [
        {"code":600139,"pred":0.1052,"actual":-0.0851},
        {"code":300309,"pred":0.0925,"actual":-0.1245},
        {"code":300108,"pred":0.0876,"actual":-0.0698},
        {"code":2076,"pred":0.0812,"actual":-0.1212},
        {"code":150,"pred":0.0789,"actual":-0.1230},
        {"code":2427,"pred":0.0745,"actual":-0.1715},
        {"code":600654,"pred":0.0721,"actual":-0.1310},
        {"code":806,"pred":0.0698,"actual":-0.0110},
        {"code":600726,"pred":0.0675,"actual":-0.1080},
        {"code":600666,"pred":0.0645,"actual":-0.2506}
      ]
    },
    {
      "test_date": "2022-03-31", "top10_return": -0.0439, "benchmark": 0.0066,
      "excess": -0.0504, "spearman": 0.1408,
      "top10": [
        {"code":587,"pred":0.0895,"actual":0.0215},
        {"code":600139,"pred":0.0823,"actual":-0.0952},
        {"code":300309,"pred":0.0768,"actual":-0.0567},
        {"code":600654,"pred":0.0734,"actual":-0.0781},
        {"code":300108,"pred":0.0710,"actual":0.0098},
        {"code":600112,"pred":0.0685,"actual":-0.0524},
        {"code":806,"pred":0.0661,"actual":0.0147},
        {"code":523,"pred":0.0638,"actual":-0.0429},
        {"code":300706,"pred":0.0612,"actual":-0.0331},
        {"code":2072,"pred":0.0588,"actual":-0.0905}
      ]
    }
  ],
  "top_features": [
    {"feature":"\u603b\u5e02\u503c_mom","importance":0.1078},
    {"feature":"\u603b\u5e02\u503c","importance":0.0904},
    {"feature":"\u4f01\u4e1a\u4ef7\u503c(EV/EBITDA)_vs_avg","importance":0.0653},
    {"feature":"\u5e02\u51c0\u7387PB(MRQ)","importance":0.0538},
    {"feature":"\u51c0\u8d44\u4ea7\u540c\u6bd4\u589e\u957f\u7387","importance":0.0355},
    {"feature":"\u5e02\u9500\u7387PS(TTM)_vs_avg","importance":0.0323},
    {"feature":"\u4f01\u4e1a\u4ef7\u503c(EV/EBITDA)_mom","importance":0.0302},
    {"feature":"PS_div_PE","importance":0.0278},
    {"feature":"\u57fa\u672c\u6bcf\u80a1\u6536\u76ca(\u540c\u6bd4\u589e\u957f\u7387)","importance":0.0265},
    {"feature":"\u8425\u4e1a\u603b\u6536\u5165(\u540c\u6bd4\u589e\u957f\u7387)","importance":0.0253},
    {"feature":"\u5e02\u9500\u7387PS(TTM)","importance":0.0251},
    {"feature":"\u5e02\u51c0\u7387PB(MRQ)_vs_avg","importance":0.0249},
    {"feature":"\u80a1\u606f\u7387(\u8fd112\u4e2a\u6708)","importance":0.0242},
    {"feature":"\u5e02\u73b0\u7387PCF(\u7ecf\u8425\u73b0\u91d1\u6d41TTM)","importance":0.0242},
    {"feature":"\u73b0\u91d1\u51c0\u6d41\u91cf\u540c\u6bd4\u589e\u957f\u7387","importance":0.0235}
  ]
};

const DATA = BACKTEST_DATA;
const periods = DATA.periods;
const dates = periods.map(p => p.test_date);
const colors = {top10: '#e17055', bmk: '#0984e3', excess: ['#00b894','#d63031'], spearman: '#6c5ce7'};
const themeColors = {
  light: { grid: '#f1f2f6', text: '#636e72' },
  dark: { grid: '#2d3436', text: '#b2bec3' }
};

// ══════════════════════════════════
// State
// ══════════════════════════════════
let topK = 10;
let featCount = 15;
let currentPeriodIdx = 0;
let chartTheme = 'light';
let charts = {};

// ══════════════════════════════════
// Init
// ══════════════════════════════════
function init() {
  renderSummary();
  populatePeriodSelect();
  document.getElementById('topKSlider').addEventListener('input', function() {
    topK = +this.value;
    document.getElementById('topKVal').textContent = topK;
    document.getElementById('tableTitleNum').textContent = topK;
    renderTopKTable();
    updateCharts();
  });
  document.getElementById('featCountSlider').addEventListener('input', function() {
    featCount = +this.value;
    document.getElementById('featCountVal').textContent = featCount;
    document.getElementById('featTitleNum').textContent = featCount;
    renderFeatureImportance();
  });
  document.getElementById('periodSelect').addEventListener('change', function() {
    currentPeriodIdx = +this.value;
    renderPeriodTabs();
    renderTopKTable();
  });
  document.getElementById('themeSelect').addEventListener('change', function() {
    chartTheme = this.value;
    updateCharts();
  });
  renderFeatureImportance();
  renderPeriodTabs();
  renderTopKTable();
  initCharts();
}

function fmt(v) { return (v * 100).toFixed(2) + '%'; }
function fmtDec(v) { return v.toFixed(4); }
function pctClass(v) { return v >= 0 ? 'positive' : 'negative'; }

function renderSummary() {
  const s = DATA.summary;
  document.getElementById('summaryCards').innerHTML = `
    <div class="card"><div class="label">总超额收益</div><div class="value ${pctClass(s.total_excess_return)}">${fmt(s.total_excess_return)}</div><div class="sub">累计 2 期</div></div>
    <div class="card"><div class="label">平均超额收益</div><div class="value ${pctClass(s.avg_excess_return)}">${fmt(s.avg_excess_return)}</div><div class="sub">每期</div></div>
    <div class="card"><div class="label">胜率（跑赢基准）</div><div class="value" style="color:#d63031">${(s.win_rate*100).toFixed(0)}%</div><div class="sub">${periods.length} 期中 ${periods.filter(p=>p.excess>0).length} 期胜</div></div>
    <div class="card"><div class="label">平均秩相关</div><div class="value" style="color:#6c5ce7">${s.avg_spearman.toFixed(3)}</div><div class="sub">Spearman ρ</div></div>
    <div class="card"><div class="label">模型/特征</div><div class="value" style="font-size:18px">RF / 37</div><div class="sub">300 trees · max_depth=12</div></div>
    <div class="card"><div class="label">策略类型</div><div class="value" style="font-size:18px">低频基本面</div><div class="sub">季度调仓 · TOP${topK} 等权</div></div>
  `;
}

function populatePeriodSelect() {
  const sel = document.getElementById('periodSelect');
  sel.innerHTML = periods.map((p,i) => `<option value="${i}">${p.test_date}</option>`).join('');
  sel.value = currentPeriodIdx;
}

function renderPeriodTabs() {
  const tabs = document.getElementById('periodTabs');
  tabs.innerHTML = periods.map((p,i) =>
    `<button class="period-btn ${i===currentPeriodIdx?'active':''}" onclick="switchPeriod(${i})">${p.test_date}</button>`
  ).join('');
}

function switchPeriod(i) {
  currentPeriodIdx = i;
  document.getElementById('periodSelect').value = i;
  renderPeriodTabs();
  renderTopKTable();
}

function renderTopKTable() {
  const p = periods[currentPeriodIdx];
  const top = p.top10.slice(0, topK);
  const tbody = document.getElementById('topKBody');
  tbody.innerHTML = top.map((s, i) => {
    const err = s.actual - s.pred;
    return `<tr>
      <td>${i+1}</td>
      <td class="code">${s.code}</td>
      <td class="${pctClass(s.pred)}">${fmt(s.pred)}</td>
      <td class="${pctClass(s.actual)}">${fmt(s.actual)}</td>
      <td style="color:${err>=0?'#00b894':'#d63031'}">${err>=0?'+':''}${fmt(err)}</td>
    </tr>`;
  }).join('');
}

function renderFeatureImportance() {
  const features = DATA.top_features.slice(0, featCount);
  const maxImp = features[0].importance;
  const container = document.getElementById('featImportance');
  const bars = features.map(f => {
    const pct = (f.importance / maxImp * 100).toFixed(1);
    const hue = 200 - (f.importance / maxImp * 150);
    return `<div class="feat-bar">
      <div class="feat-name" title="${f.feature}">${f.feature}</div>
      <div class="feat-track"><div class="feat-fill" style="width:${pct}%;background:hsl(${hue},70%,55%)"></div></div>
      <span style="font-size:11px;color:#636e72;margin-left:6px;min-width:36px">${(f.importance*100).toFixed(2)}%</span>
    </div>`;
  }).join('');
  container.innerHTML = bars;
}

// ══════════════════════════════════
// Charts
// ══════════════════════════════════
let chartInstances = {};

function initCharts() {
  updateCharts();
}

function getTheme() {
  return chartTheme === 'light'
    ? { grid: '#f1f2f6', text: '#636e72', bg: '#fff' }
    : { grid: '#2d3436', text: '#b2bec3', bg: '#1a1a2e' };
}

function updateCharts() {
  Object.values(chartInstances).forEach(c => { if (c) c.destroy(); });
  chartInstances = {};
  renderReturnChart();
  renderExcessChart();
  renderCumulChart();
  renderSpearmanChart();
}

function renderReturnChart() {
  const ctx = document.getElementById('returnChart').getContext('2d');
  const d = periods.map(p => p.top10_return);
  const b = periods.map(p => p.benchmark);
  chartInstances.return = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: dates,
      datasets: [
        { label: 'TOP K 等权', data: d, backgroundColor: 'rgba(225,112,85,0.8)', borderColor: '#e17055', borderWidth: 1 },
        { label: '基准（全市场均等）', data: b, backgroundColor: 'rgba(9,132,227,0.7)', borderColor: '#0984e3', borderWidth: 1 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { boxWidth: 12, padding: 12, font: { size: 11 } } },
        tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + (ctx.parsed.y * 100).toFixed(2) + '%' } }
      },
      scales: {
        y: { ticks: { callback: v => (v * 100).toFixed(0) + '%' }, grid: { color: getTheme().grid } }
      }
    }
  });
}

function renderExcessChart() {
  const ctx = document.getElementById('excessChart').getContext('2d');
  const ex = periods.map(p => p.excess);
  const bg = ex.map(v => v >= 0 ? 'rgba(0,184,148,0.8)' : 'rgba(214,48,49,0.8)');
  const bd = ex.map(v => v >= 0 ? '#00b894' : '#d63031');
  chartInstances.excess = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: dates,
      datasets: [{
        label: '超额收益',
        data: ex,
        backgroundColor: bg,
        borderColor: bd,
        borderWidth: 1
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => '超额: ' + (ctx.parsed.y * 100).toFixed(2) + '%' } }
      },
      scales: {
        y: { ticks: { callback: v => (v * 100).toFixed(0) + '%' }, grid: { color: getTheme().grid } }
      }
    }
  });
}

function renderCumulChart() {
  const ctx = document.getElementById('cumulChart').getContext('2d');
  let cumTop = [1], cumBmk = [1];
  periods.forEach(p => { cumTop.push(cumTop[cumTop.length-1] * (1 + p.top10_return)); });
  periods.forEach(p => { cumBmk.push(cumBmk[cumBmk.length-1] * (1 + p.benchmark)); });
  chartInstances.cumul = new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['初始', ...dates],
      datasets: [
        { label: 'TOP K 策略', data: cumTop, borderColor: '#e17055', backgroundColor: 'rgba(225,112,85,0.1)', fill: true, tension: 0.3, pointRadius: 4 },
        { label: '基准', data: cumBmk, borderColor: '#0984e3', backgroundColor: 'rgba(9,132,227,0.1)', fill: true, tension: 0.3, pointRadius: 4, borderDash: [5,3] }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { boxWidth: 12, padding: 12, font: { size: 11 } } },
        tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(4) } }
      },
      scales: {
        y: { grid: { color: getTheme().grid } }
      }
    }
  });
}

function renderSpearmanChart() {
  const ctx = document.getElementById('spearmanChart').getContext('2d');
  const sp = periods.map(p => p.spearman);
  const bg = sp.map(v => v >= 0 ? 'rgba(108,92,231,0.8)' : 'rgba(214,48,49,0.8)');
  chartInstances.spearman = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: dates,
      datasets: [{
        label: 'Spearman ρ',
        data: sp,
        backgroundColor: bg,
        borderColor: '#6c5ce7',
        borderWidth: 1
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => 'ρ = ' + ctx.parsed.y.toFixed(4) } }
      },
      scales: {
        y: { min: -0.2, max: 0.3, grid: { color: getTheme().grid } }
      }
    }
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
